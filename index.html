<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surya Gudipati</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="16x16" href="icon16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icon48.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="icon48.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="matrix"></canvas>

    <div class="overlay">
      <header class="top-bar">
        <div class="clock-wrap">
          <div id="clock-digital" class="glitch" data-text="00:00:00">
            00:00:00
          </div>
          <div id="clock-analog" style="display: none">
            <div class="analog-dial">
              <div class="hand hour-hand" id="hour-hand"></div>
              <div class="hand min-hand" id="min-hand"></div>
              <div class="hand sec-hand" id="sec-hand"></div>
            </div>
          </div>
          <div id="date-display" class="date-display"></div>
        </div>
        <div id="greeting"></div>
        <div class="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="> Search the web..."
            autocomplete="off"
          />
        </div>
      </header>

      <main class="dashboard">
        <section class="panel bookmarks-section">
          <h2>&gt; Bookmarks</h2>
          <div class="input-group">
            <input
              type="text"
              id="bm-title"
              placeholder="Title"
              autocomplete="off"
            />
            <input
              type="text"
              id="bm-url"
              placeholder="URL (https://)"
              autocomplete="off"
            />
            <button id="add-bm-btn">[ADD]</button>
          </div>
          <div id="bookmarks-container" class="grid-container">
            <!-- Bookmarks injected here -->
          </div>
        </section>

        <section class="panel cs-hub-section">
          <h2>&gt; Developer Hub</h2>

          <!-- Pomodoro Timer -->
          <div class="pomodoro-container">
            <div class="hourglass-wrapper">
              <svg width="80" height="120" id="hourglass-svg">
                <defs>
                  <clipPath id="top-sand-clip">
                    <rect
                      id="sand-top-rect"
                      x="0"
                      y="9"
                      width="80"
                      height="47"
                    />
                  </clipPath>
                  <clipPath id="bottom-sand-clip">
                    <rect
                      id="sand-bottom-rect"
                      x="0"
                      y="111"
                      width="80"
                      height="0"
                    />
                  </clipPath>
                </defs>
                <!-- Glass outline -->
                <path
                  d="M 5 5 L 75 5 L 45 60 L 75 115 L 5 115 L 35 60 Z"
                  fill="rgba(0,0,0,0.5)"
                  stroke="var(--primary-color)"
                  stroke-width="4"
                  stroke-linejoin="round"
                />
                <!-- Top Sand -->
                <path
                  d="M 9 9 L 71 9 L 45 56 L 35 56 Z"
                  fill="var(--primary-color)"
                  clip-path="url(#top-sand-clip)"
                />
                <!-- Bottom Sand -->
                <path
                  d="M 45 64 L 71 111 L 9 111 L 35 64 Z"
                  fill="var(--primary-color)"
                  clip-path="url(#bottom-sand-clip)"
                />
                <!-- Falling sand line -->
                <rect
                  id="falling-sand"
                  x="39"
                  y="56"
                  width="2"
                  height="55"
                  fill="var(--primary-color)"
                  style="display: none"
                />
              </svg>
            </div>
            <div id="pomodoro-time">25:00</div>
            <div class="pomodoro-settings">
              <button class="time-adjust" id="pomo-minus">-</button>
              <input
                type="number"
                id="pomodoro-input"
                value="25"
                min="1"
                max="120"
                autocomplete="off"
                title="Minutes"
              />
              <button class="time-adjust" id="pomo-plus">+</button>
            </div>
            <div class="pomodoro-controls">
              <button id="pomodoro-start" class="cyber-btn">START</button>
              <button id="pomodoro-stop" class="cyber-btn">PAUSE</button>
              <button id="pomodoro-reset" class="cyber-btn">RESET</button>
            </div>
          </div>

          <div id="dev-widgets">
            <!-- LeetCode Daily -->
            <div class="leetcode-container" id="leetcode-container">
              <p class="loading-text">Fetching LeetCode Daily...</p>
            </div>

            <!-- Cyber Terminal -->
            <div class="cyber-terminal">
              <div id="term-output">
                <div style="color: var(--primary-color)">
                  > System Ready. Type 'help'
                </div>
              </div>
              <div class="term-input-line">
                <span class="term-prompt">root@sys:~#</span>
                <input
                  type="text"
                  id="term-input"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>
            </div>
          </div>

          <div id="general-widgets" style="display: none">
            <!-- Quick Notes -->
            <div class="quick-notes-container">
              <textarea
                id="quick-notes"
                placeholder="> Scratchpad..."
                spellcheck="false"
              ></textarea>
            </div>

            <!-- Daily Motivation -->
            <div class="motivation-container">
              <div id="quote-text" class="loading-text">Fetching quote...</div>
              <div id="quote-author"></div>
            </div>
          </div>
        </section>

        <section class="panel todo-section">
          <h2>&gt; Tasks_</h2>
          <div class="todo-input-container">
            <input
              type="text"
              id="todo-input"
              placeholder="Add a new task..."
            />
            <button id="add-todo-btn">[ADD]</button>
          </div>
          <ul id="todo-list">
            <!-- Tasks injected here -->
          </ul>
        </section>
      </main>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fab-btn">⚙</button>

    <!-- Master Settings Modal -->
    <div id="settings-modal" class="modal-hidden">
      <div class="modal-content">
        <h2>&gt; System Configuration</h2>
        <button id="close-settings" class="close-btn">[X]</button>
        <div class="settings-grid">
          <div class="setting-item">
            <label>Username</label>
            <input type="text" id="setting-name" value="Devesh" />
          </div>
          <div class="setting-item">
            <label>Theme Color</label>
            <input type="color" id="setting-color" value="#00ffcc" />
          </div>
          <div class="setting-item">
            <label>Clock Style</label>
            <select id="setting-clock">
              <option value="digital">Digital (Glitch)</option>
              <option value="analog">Analog Vector</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Dashboard Mode</label>
            <select id="setting-mode">
              <option value="dev">Developer</option>
              <option value="general">Focus (General)</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Matrix Background</label>
            <input type="checkbox" id="setting-matrix" checked />
          </div>
          <div class="setting-item full-width">
            <label>Dashboard Visibility Modules</label>
            <div class="toggle-group">
              <label
                ><input type="checkbox" id="setting-show-bm" checked />
                Bookmarks</label
              >
              <label
                ><input type="checkbox" id="setting-show-dh" checked />
                Developer Hub</label
              >
              <label
                ><input type="checkbox" id="setting-show-td" checked />
                Tasks_</label
              >
            </div>
          </div>
        </div>
        <div class="dev-credits modal-credits">
          <div class="credit-header">> System Architect</div>
          <div class="credit-body">
            <span class="dev-name">Surya Gudipati</span>
            <div class="social-links">
              <a
                href="https://github.com"
                target="_blank"
                title="GitHub Profile"
              >
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="currentColor"
                    d="M12 2C6.477 2 2 6.477 2 12c0 4.419 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z"
                  />
                </svg>
              </a>
              <a
                href="www.linkedin.com/in/surya-gudipati-a285b4401"
                target="_blank"
                title="LinkedIn Profile"
              >
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="currentColor"
                    d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
        <p
          style="
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 20px;
          "
        >
          Settings autosave instantly.
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
